version: "3.9"

services:

  backend:
    build: ./backend

    container_name: movie_backend

    ports:
      - "8000:8000"

    restart: unless-stopped

  frontend:
    build: ./frontend

    container_name: movie_frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    restart: unless-stopped